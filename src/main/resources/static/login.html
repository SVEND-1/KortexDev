<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход в админ-панель | KortexDev</title>
    <meta name="robots" content="noindex, nofollow" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(233, 183, 9, 0.05) 0%, transparent 70%);
            animation: rotateBg 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-box {
            position: relative;
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #e9b709, #ffd700, #e9b709, transparent);
            border-radius: 24px 24px 0 0;
            animation: shimmerLine 3s infinite;
        }

        @keyframes shimmerLine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e9b709 0%, #ffd700 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
            font-family: 'JetBrains Mono', monospace;
        }

        .login-header h1 {
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.6);
        }

        .input-group input {
            padding: 0.875rem 1rem;
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group input:focus {
            outline: none;
            border-color: #e9b709;
            box-shadow: 0 0 0 3px rgba(233, 183, 9, 0.1);
        }

        .error-message {
            padding: 0.75rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: #ef4444;
            font-size: 0.75rem;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .login-btn {
            margin-top: 0.5rem;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #e9b709 0%, #ffd700 100%);
            border: none;
            border-radius: 12px;
            color: #000000;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .login-btn:hover:not(:disabled)::before {
            width: 300px;
            height: 300px;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233, 183, 9, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .login-box {
                padding: 2rem 1.5rem;
                max-width: 90%;
            }
            .logo {
                font-size: 1.5rem;
            }
            .login-header h1 {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 1.5rem 1.25rem;
                max-width: 100%;
            }
            .logo {
                font-size: 1.25rem;
            }
            .login-header {
                margin-bottom: 1.5rem;
            }
            .login-form {
                gap: 1rem;
            }
            .input-group input {
                padding: 0.75rem 0.875rem;
                font-size: 0.8rem;
            }
            .login-btn {
                padding: 0.75rem 1.25rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="login-header">
        <div class="logo">{< ADMIN >}</div>
        <h1>Вход в панель управления</h1>
    </div>

    <form id="loginForm" class="login-form">
        <div class="input-group">
            <label for="username">Логин</label>
            <input
                    type="text"
                    id="username"
                    placeholder="Введите логин"
                    required
            />
        </div>

        <div class="input-group">
            <label for="password">Пароль</label>
            <input
                    type="password"
                    id="password"
                    placeholder="Введите пароль"
                    required
            />
        </div>

        <div id="errorMessage" class="error-message"></div>

        <button type="submit" class="login-btn" id="loginBtn">
            Войти
        </button>
    </form>
</div>

<script src="config.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async function() {
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');

        const API_BASE_URL = window.API_BASE_URL;
        const LOGIN_URL = `${API_BASE_URL}/api/admin/login`;



        // Проверяем сессию через защищённый эндпоинт
        try {
            const check = await fetch(`${API_BASE_URL}/api/admin/project?limit=1`, { credentials: 'include' });
            if (check.ok) {
                window.location.href = 'admin.html';
                return;
            }
        } catch(e) {}

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showError('Заполните все поля');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Вход...';
            errorMessage.classList.remove('show');

            try {
                const response = await fetch(
                    `${LOGIN_URL}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`,
                    {
                        method: 'POST',
                        credentials: 'include',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                    }
                );

                if (response.status === 200) {
                    window.location.href = 'admin.html';
                    return;
                }

                let errorMsg = 'Неверный логин или пароль';

                if (response.status === 401) {
                    errorMsg = 'Неверный логин или пароль';
                } else if (response.status === 404) {
                    errorMsg = 'Сервер не найден. Проверьте подключение.';
                } else if (response.status === 403) {
                    errorMsg = 'Доступ запрещен. У вас нет прав администратора.';
                } else if (response.status === 500) {
                    errorMsg = 'Ошибка на сервере. Попробуйте позже.';
                } else {
                    try {
                        const errorData = await response.json();
                        errorMsg = errorData.error || errorData.message || errorMsg;
                    } catch {
                        errorMsg = `Ошибка: ${response.status}`;
                    }
                }

                throw new Error(errorMsg);

            } catch (error) {
                console.error('Login error:', error);
                showError(error.message || 'Ошибка соединения с сервером');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            usernameInput.focus();
            usernameInput.select();
        }

        usernameInput.addEventListener('input', function() {
            errorMessage.classList.remove('show');
        });
        passwordInput.addEventListener('input', function() {
            errorMessage.classList.remove('show');
        });

        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });
    });
</script>
</body>
</html>
